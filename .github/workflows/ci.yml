name: Drag and drop tests
on: [push, workflow_dispatch]
jobs:
  playwright:
    name: "Playwright tests (${{ matrix.project }})"
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      # One shard per Playwright project: the full suite serially exceeds the
      # job timeout, and sharding keeps each run well inside it.
      fail-fast: false
      matrix:
        include:
          - project: Desktop Chrome
            browser: chromium
            slug: chrome
          - project: Desktop Firefox
            browser: firefox
            slug: firefox
          - project: Desktop Webkit
            browser: webkit
            slug: webkit
          - project: iPhone 13 Chromium
            browser: chromium
            slug: mobile-chromium
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
      - name: Update npm
        run: npm install -g npm@latest
      - name: Verify runtime
        run: |
          node --version
          npm --version
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - run: pnpm install --frozen-lockfile
      - name: Build Dev Frameworks
        run: cd tests-frameworks && pnpm install && cd ..
      - name: Build Dev
        run: cd tests && pnpm install && cd ..
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - name: Run Playwright tests
        run: pnpm exec playwright test --project "${{ matrix.project }}"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.slug }}
          path: playwright-report/
          retention-days: 30
